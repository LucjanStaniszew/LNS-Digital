    <main class="contacto">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d6768.66784455541!2d-64.55666571006469!3d-31.97896219283918!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95d2b0447c2bd5ff%3A0x3245f2bd7c030f4c!2sPlaza%20Jose%20Hernandez!5e0!3m2!1ses!2sar!4v1772501136900!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        <form action="" class="form">
            <label for="name" class="special">Nombre:</label>
            <input type="text" id="name" placeholder="John">

            <label for="surname" class="special">Apellido:</label>
            <input type="text" id="surname" placeholder="Doe">

            <label for="age" class="special">Edad:</label>
            <input type="number" id="age" placeholder="25">

            <label for="mail" class="special">e-Mail:</label>
            <input type="email" id="mail" placeholder="johndoe@gmail.com">

            <label for="pass" class="special">Contraseña:</label>
            <input type="password" id="pass" placeholder="***********">

            <label for="comments" class="special">Dejanos tus comentarios:</label>
            <textarea id="comments" placeholder="Comentarios..."></textarea>
            <div class="form-btns-cont">
                <input type="submit" value="Enviar" class="form-btns">
                <input type="reset" value="Comenzar de nuevo" class="form-btns">
            </div>
        </form>

        <iframe width="560" height="315" src="https://www.youtube.com/embed/6stlCkUDG_s?si=1GqgVXjnNsj_5Cfo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
